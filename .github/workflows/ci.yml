name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Prepare GOPATH layout for vendored legacy build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.gopath/src/github.com/sneederco"
          ln -s "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.gopath/src/github.com/sneederco/docker-machine-driver-ovh"
      - name: Run tests
        env:
          GOPATH: ${{ github.workspace }}/.gopath
          GO111MODULE: off
        run: |
          cd "$GOPATH/src/github.com/sneederco/docker-machine-driver-ovh"
          go test ./...

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Prepare GOPATH layout for vendored legacy build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.gopath/src/github.com/sneederco"
          ln -s "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.gopath/src/github.com/sneederco/docker-machine-driver-ovh"
      - name: Build linux/${{ matrix.arch }} binary + checksum
        env:
          GOPATH: ${{ github.workspace }}/.gopath
        run: |
          cd "$GOPATH/src/github.com/sneederco/docker-machine-driver-ovh"
          ./scripts/build.sh "${{ matrix.arch }}" dist
      - name: Upload artifact + checksum
        uses: actions/upload-artifact@v4
        with:
          name: docker-machine-driver-ovh-linux-${{ matrix.arch }}
          path: |
            dist/docker-machine-driver-ovh-linux-${{ matrix.arch }}
            dist/docker-machine-driver-ovh-linux-${{ matrix.arch }}.sha256

  reproducibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Prepare GOPATH layout for vendored legacy build
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.gopath/src/github.com/sneederco"
          ln -s "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.gopath/src/github.com/sneederco/docker-machine-driver-ovh"
